# SDX prod-guard pattern configuration (REQ-PROD-1).
# One extended-regex per line. Empty file (all comments) = NO PROTECTION.
# Protection is opt-in: fill this file with patterns specific to your project.
#
# Заполняется под каждый проект: прод-хосты, флаги окружения, деплой-команды.
# SDX meta-project has NO production environment -> intentionally left empty.
#
# Examples (uncomment and adapt for your project):
# ssh[[:space:]]+.*prod
# --env[=[:space:]]prod(uction)?
# deploy.*(prod|production)
# rsync.*@.*prod
# kubectl.*--namespace[=[:space:]]prod
